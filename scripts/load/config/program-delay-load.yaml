service:
  name: program-service
  env: load
  adapter_mode: infra
http:
  addr: :8002
  timeout: 5s
grpc:
  addr: :9002
  timeout: 5s
mysql:
  dsn: ${TICKETHUB_MYSQL_USER}:${TICKETHUB_MYSQL_PASSWORD}@tcp(${TICKETHUB_MYSQL_HOST})/tickethub_program?parseTime=true&loc=Local&charset=utf8mb4
  max_open_conns: 100
  max_idle_conns: 50
redis:
  addr: 127.0.0.1:6379
  key_prefix: tickethub:program
cache:
  mode: multilevel
  local_num_counters: 100000
  local_max_cost_bytes: 67108864
  local_buffer_items: 64
  local_lock_stripes: 256
  local_ttl: 45s
  redis_ttl: 5m
  rebuild_lock_ttl: 5s
  rebuild_wait: 750ms
  rebuild_poll: 25ms
purchase_rate_limit:
  user_rate: 100000
  user_burst: 100000
  program_rate: 100000
  program_burst: 100000
workers:
  disabled: [index_sync, outbox, program_events, cache_invalidation]
kafka:
  brokers: [127.0.0.1:9094]
  client_id: program-service-delay-load
  group_id: program-service-delay-load
  topics:
    create_order: ticket_hub.create_order
    program_changed: ticket_hub.program_changed
grpc_upstreams:
  user-service: ""
elasticsearch:
  addresses: [http://127.0.0.1:9200]
  index: tickethub_programs_current
  version: v2
  sync_interval: 5m
  batch_size: 500
observability:
  metrics_addr: :19002
  log_level: info
