apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: tickethub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: tickethub/user-service:local
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: tickethub
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
